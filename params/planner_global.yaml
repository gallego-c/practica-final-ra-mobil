allow_unknown:  true
default_tolerance: 0.3

use_dijkstra:   true
use_quadratic:  true
use_grid_path:  false   # false = smoother interpolated path, easier for local planner to follow

lethal_cost:    253
neutral_cost:    50
cost_factor:     3.5    # higher → global path stays further from walls/corners

publish_potential: true
orientation_mode: 0
orientation_window_size: 1
