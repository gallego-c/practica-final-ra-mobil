# Global planner for SLAM demo: only plan through known free cells.
# With allow_unknown: true the planner routes through unmapped space; the robot
# hits real walls, move_base recovery fails (rotate sees lethal cost -1), and
# both robots appear stuck.
allow_unknown:  false
default_tolerance: 0.3

use_dijkstra:   true
use_quadratic:  true
use_grid_path:  false

lethal_cost:    253
neutral_cost:    50
cost_factor:     3.5

publish_potential: true
orientation_mode: 0
orientation_window_size: 1
