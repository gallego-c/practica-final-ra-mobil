# Common costmap parameters for single-robot SLAM exploration (Waffle Pi)
footprint: [[-0.205, -0.155], [-0.205, 0.155], [0.077, 0.155], [0.077, -0.155]]
map_type: costmap

obstacle_layer:
  enabled:         true
  obstacle_range:  2.5
  raytrace_range:  3.5
  max_obstacle_height: 2.0
  min_obstacle_height: 0.0
  observation_sources: scan
  scan:
    data_type:           LaserScan
    topic:               scan
    sensor_frame:        ""
    marking:             true
    clearing:            true
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0

inflation_layer:
  inflation_radius:    0.32  # Safer radius (larger than circumscribed radius 0.257m)
  cost_scaling_factor: 10.0  # Decent cost falloff gradient
