# Local costmap parameters for single-robot SLAM
global_frame: robot1/odom
robot_base_frame: robot1/base_footprint
update_frequency: 15.0
publish_frequency: 8.0
static_map: false
rolling_window: true
width: 4.0
height: 4.0
resolution: 0.05
transform_tolerance: 0.5

plugins:
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

inflation_layer:
  inflation_radius: 0.30  # Increased local safety buffer to prevent collisions during rotation and control delay
  cost_scaling_factor: 8.0
