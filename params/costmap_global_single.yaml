# Global costmap parameters for single-robot SLAM
global_frame: map
robot_base_frame: robot1/base_footprint
update_frequency: 2.0
publish_frequency: 1.0
static_map: true
rolling_window: false
transform_tolerance: 1.0

plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /map
  subscribe_to_updates: true
  track_unknown_space: true # Keep track of unknown space so global planner prefers known free space
  unknown_cost_value: 255   # Treat unknown space as unknown/unexplored (to plan through it when needed)
  trinary_costmap: true

inflation_layer:
  inflation_radius: 0.35    # Safe global planning clearance (circumscribed radius is 0.257m)
  cost_scaling_factor: 10.0
