# Planner5D tuned for SLAM + narrow passages (gap, wall ends).
max_vel_x:          0.22
min_vel_x:         -0.14
max_vel_theta:      1.6
acc_lim_x:          2.5
acc_lim_theta:      3.2

xy_goal_tolerance:  0.18
yaw_goal_tolerance: 0.15

sim_time:           1.8
sim_step:           0.04
v_samples:          16
omega_samples:      32
max_iterations:     500

# Prefer staying on the global plan in corridors.
path_follow_weight: 2.5
proximity_weight:   0.15
