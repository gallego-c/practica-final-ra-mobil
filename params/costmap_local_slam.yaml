global_frame: odom
robot_base_frame: base_footprint
update_frequency: 15.0
publish_frequency: 8.0
static_map: false
rolling_window: true
width: 5.5
height: 5.5
resolution: 0.05
transform_tolerance: 0.8
plugins:
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

# SLAM maps and the other robot obstacle are noisier than the known-map demo.
# Keep a larger safety bubble here without changing the stable navigation flow.
inflation_layer:
  inflation_radius: 0.38
  cost_scaling_factor: 4.0
