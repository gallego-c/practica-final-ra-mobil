# DWA Local Planner — TurtleBot3 Waffle Pi
# Kinematic limits
max_vel_x:      0.26
min_vel_x:      0.0
max_vel_y:      0.0
min_vel_y:      0.0
max_vel_trans:  0.26
min_vel_trans:  0.02
max_vel_theta:  1.82
min_vel_theta: -1.82
min_rot_vel:    0.20

acc_lim_x:      2.5
acc_lim_y:      0.0
acc_lim_theta:  3.2

# Goal tolerances
xy_goal_tolerance:   0.15
yaw_goal_tolerance:  0.2
latch_xy_goal_tolerance: false

# Trajectory simulation
sim_time:        1.5
sim_granularity: 0.025
vx_samples:      15
vy_samples:      0
vtheta_samples:  40

controller_frequency: 10.0

# Scoring weights.
# KEY: occdist_scale is intentionally LOW (0.05).
# The footprint-based collision check inside DWA already prevents the robot
# from physically entering lethal cells — it doesn't need occdist_scale for
# safety.  A high occdist_scale causes oscillation at wall ends because the
# planner can't find trajectories that both follow the plan AND stay far from
# the wall.  Low occdist_scale lets the robot commit to passing near wall ends
# while the footprint check prevents actual contact.
path_distance_bias:  32.0   # strong plan adherence — follow the global path
goal_distance_bias:  20.0
occdist_scale:        0.05

# Footprint scoring point (slightly less than inscribed radius 0.155 m)
forward_point_distance: 0.18

stop_time_buffer:       0.2
scaling_speed:          0.25
max_scaling_factor:     0.2
oscillation_reset_dist: 0.05
