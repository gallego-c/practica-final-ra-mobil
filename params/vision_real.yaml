# El bringup publica cv_camera/image_raw[/compressed], NO camera/rgb/... (eso es Gazebo).
camera_topic: ""
compressed_camera_topic: "cv_camera/image_raw/compressed"
scan_topic: "scan"

base_frame: "base_footprint"
map_frame: "map"

# FOV horizontal cámara Waffle Pi (~62.2°).
horizontal_fov: 1.085595

max_detection_distance: 5.0
range_window: 0.25

# Desactivar comprobación de imagen obsoleta (0 = desactivado).
max_image_age: 0

# ─── ArUco ──────────────────────────────────────────────────────────────
# Usar detección ArUco en vez de HSV color.
use_aruco: true
aruco_marker_id: 0         # ID del marcador (el tuyo es 0)
aruco_dictionary: 0        # 0 = DICT_4X4_50

# ─── HSV (solo si use_aruco: false) ─────────────────────────────────────
h_low1: 0
h_high1: 8
h_low2: 172
h_high2: 180
s_min: 150
v_min: 80
min_blob_area: 500
max_blob_area: 8000
use_rgb_fallback: false

publish_debug: true
