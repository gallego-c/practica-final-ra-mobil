# El bringup publica cv_camera/image_raw[/compressed], NO camera/rgb/... (eso es Gazebo).
# Desactivamos el topic raw ("") para evitar transferir frames pesados sin comprimir sobre WiFi.
camera_topic: ""
compressed_camera_topic: "cv_camera/image_raw/compressed"
scan_topic: "scan"

base_frame: "base_footprint"
map_frame: "map"

# FOV horizontal cámara Waffle Pi (~62.2°).
horizontal_fov: 1.085595

# ─── Filtros de tamaño del blob (en píxeles) ───────────────────────────
# min: rechaza detecciones pequeñas (ruido, reflejos).
# max: rechaza objetos rojos grandes (extintores, paredes).
#      Ajustar según tamaño real de la cartulina vs el extintor.
#      Usa rqt_image_view en ~/flag_detector/debug_image para ver el área.
min_blob_area: 500
max_blob_area: 8000

max_detection_distance: 5.0
range_window: 0.25

# Desactivar comprobación de imagen obsoleta (0 = desactivado).
# En multi-máquina los relojes no están sincronizados y rechazaría todos los frames.
max_image_age: 0

# ─── Umbrales HSV ───────────────────────────────────────────────────────
# Cartulina roja → H≈0-5 ó 175-180, S alto, V medio-alto.
# Paredes marrones → H≈10-20, S bajo (< 140). s_min alto las excluye.
h_low1: 0
h_high1: 8
h_low2: 172
h_high2: 180
s_min: 150
v_min: 80

use_rgb_fallback: false
rgb_red_min: 100
rgb_red_dominance: 1.3

# ─── Filtro de forma (aspect ratio = ancho/alto) ──────────────────────
# Desactivado por ahora (0 / 100) — activar si hace falta distinguir
# por forma además de por tamaño.
min_aspect_ratio: 0.0
max_aspect_ratio: 100.0

publish_debug: true
