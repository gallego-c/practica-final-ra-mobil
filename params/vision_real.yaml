# El bringup publica cv_camera/image_raw[/compressed], NO camera/rgb/... (eso es Gazebo).
camera_topic: ""
compressed_camera_topic: "cv_camera/image_raw/compressed"
scan_topic: "scan"

base_frame: "base_footprint"
map_frame: "map"

# FOV horizontal cámara Waffle Pi (~62.2°).
horizontal_fov: 1.085595

max_detection_distance: 5.0
range_window: 0.25

# Desactivar comprobación de imagen obsoleta (0 = desactivado).
max_image_age: 0

# ─── ArUco / AprilTag ───────────────────────────────────────────────────
aruco_marker_id: 3         # El usuario tiene AprilTag ID=3
aruco_dictionary: 20       # 20 = DICT_APRILTAG_36h11

publish_debug: true
