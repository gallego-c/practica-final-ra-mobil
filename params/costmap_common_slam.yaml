# SLAM exploration: keep the same safety envelope as the visio navigation flow.
footprint: [[-0.205, -0.155], [-0.205, 0.155], [0.077, 0.155], [0.077, -0.155]]

obstacle_layer:
  enabled:         true
  obstacle_range:  2.5
  raytrace_range:  3.5
  max_obstacle_height: 2.0
  min_obstacle_height: 0.0
  observation_sources: scan other_robot
  scan:
    data_type:              LaserScan
    topic:                  scan
    sensor_frame:           ""
    marking:                true
    clearing:               true
    min_obstacle_height:    0.0
    max_obstacle_height:    2.0
    observation_persistence: 0.0
  other_robot:
    data_type:              PointCloud2
    topic:                  other_robot_cloud
    sensor_frame:           map
    marking:                true
    # Local costmap is in odom; raytrace clearing from map origin is out of bounds.
    clearing:               false
    min_obstacle_height:    0.0
    max_obstacle_height:    0.5
    observation_persistence: 0.0

inflation_layer:
  inflation_radius:    0.22
  cost_scaling_factor: 12.0
