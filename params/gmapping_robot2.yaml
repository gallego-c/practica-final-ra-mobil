# GMapping tuned for TurtleBot3 Waffle Pi (Robot 2) — Real robot
# Parameters adjusted for open spaces with few features.
transform_publish_period: 0.02
map_update_interval: 1.0
maxUrange: 3.5
maxRange: 3.5
sigma: 0.05
kernelSize: 1
lstep: 0.05
astep: 0.05
iterations: 15
lsigma: 0.075
ogain: 3.0
# Low minimumScore: in open spaces the LIDAR returns few hits,
# so scan matching scores are very low. A high threshold would
# make GMapping stop updating the map→odom transform entirely.
minimumScore: 30
llsamplerange: 0.01
llsamplestep: 0.01
lasamplerange: 0.005
lasamplestep: 0.005
linearUpdate: 0.15
angularUpdate: 0.15
temporalUpdate: 1.0
particles: 30
xmin: -10.0
ymin: -10.0
xmax: 10.0
ymax: 10.0
delta: 0.05
# Real robot odometry noise — wheels slip more on real surfaces
srr: 0.05
srt: 0.05
str: 0.05
stt: 0.05
