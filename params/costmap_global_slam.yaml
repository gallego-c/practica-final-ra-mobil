global_frame: map
robot_base_frame: base_footprint
update_frequency: 8.0
publish_frequency: 4.0
rolling_window: false
transform_tolerance: 2.0
plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /merged_map
  subscribe_to_updates: true
  track_unknown_space: true
  unknown_cost_value: 255
  trinary_costmap: true

# No obstacle_layer on the global costmap: transient LiDAR marks (e.g. a teammate
# at a doorway) persist as phantom blocks when clearing rays no longer reach them.
# Dynamic avoidance stays on the local costmap (scan + other_robot_cloud + DWA).

# Wider inflation + steep cost falloff → global plans prefer corridor centers
# over hugging walls. Local costmap stays tighter for execution.
inflation_layer:
  inflation_radius: 0.30
  cost_scaling_factor: 15.0
