global_frame: map
robot_base_frame: base_footprint
update_frequency: 8.0
publish_frequency: 4.0
static_map: true
rolling_window: false
transform_tolerance: 1.0
plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /merged_map
  subscribe_to_updates: true
  track_unknown_space: true
  unknown_cost_value: 255
  trinary_costmap: true

# The obstacle_layer config (scan + other_robot sources) is loaded from
# costmap_common_slam.yaml. Adding the obstacle_layer here lets the global
# planner see dynamic obstacles (the flag, the other robot, moved furniture)
# that are not yet in the static SLAM map.

# Wider inflation + steep cost falloff → global plans prefer corridor centers
# over hugging walls. Local costmap stays tighter for execution.
inflation_layer:
  inflation_radius: 0.30
  cost_scaling_factor: 15.0
