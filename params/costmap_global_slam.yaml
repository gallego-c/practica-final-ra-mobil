global_frame: map
robot_base_frame: base_footprint
update_frequency: 2.0
publish_frequency: 1.0
static_map: true
rolling_window: false
transform_tolerance: 1.0
plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

static_layer:
  map_topic: /merged_map
  subscribe_to_updates: true
  track_unknown_space: true

inflation_layer:
  inflation_radius: 0.28
  cost_scaling_factor: 12.0

# No fixed width/height/origin here: the global costmap must adopt the merged
# map bounds exactly, otherwise obstacles appear shifted from the SLAM map.
