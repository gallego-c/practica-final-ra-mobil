global_frame: map
robot_base_frame: base_footprint
update_frequency: 5.0      # faster so dynamic obstacles appear quickly in global plan
publish_frequency: 2.0
static_map: true
rolling_window: false
width:  10.0
height: 10.0
origin_x: -5.0
origin_y: -5.0
transform_tolerance: 1.0
plugins:
  - {name: static_layer,   type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

# obstacle_layer params for the global costmap.
# scan/topic and other_robot/topic are overridden per robot in navigation.launch.
# observation_persistence > 0 so marks survive long enough for the global
# planner to react, but are removed once the obstacle is gone (no re-scan).
obstacle_layer:
  enabled:         true
  obstacle_range:  2.5
  raytrace_range:  3.5
  max_obstacle_height: 2.0
  min_obstacle_height: 0.0
  observation_sources: scan other_robot
  scan:
    data_type:              LaserScan
    topic:                  scan          # overridden per robot in navigation.launch
    sensor_frame:           ""
    marking:                true
    clearing:               true
    min_obstacle_height:    0.0
    max_obstacle_height:    2.0
    observation_persistence: 3.0   # marks survive 3 s after last scan; cleared when robot re-sweeps
  other_robot:
    data_type:              PointCloud2
    topic:                  other_robot_cloud  # overridden per robot in navigation.launch
    sensor_frame:           map
    marking:                true
    clearing:               false
    min_obstacle_height:    0.0
    max_obstacle_height:    0.5
    observation_persistence: 2.0

# inflation_radius >= circumscribed radius of footprint for conservative global planning
inflation_layer:
  inflation_radius:    0.28
  cost_scaling_factor: 12.0
