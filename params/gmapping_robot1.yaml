# GMapping tuned for TurtleBot3 Waffle Pi (Robot 1) in Gazebo
# High-precision scan-matching and fast update parameters to prevent map drift and alignment offsets.
# 20 Hz matches Gazebo sim steps; faster rates duplicate timestamps (TF_REPEATED_DATA)
# and stale the buffer, causing move_base extrapolation errors.
transform_publish_period: 0.05
tf_delay: 0.1
map_update_interval: 1.0
maxUrange: 3.5
maxRange: 3.5
sigma: 0.05
kernelSize: 1
lstep: 0.05
astep: 0.05
iterations: 15
lsigma: 0.075
ogain: 3.0
minimumScore: 80
llsamplerange: 0.01
llsamplestep: 0.01
lasamplerange: 0.005
lasamplestep: 0.005
linearUpdate: 0.2
angularUpdate: 0.2
temporalUpdate: 1.0
particles: 30
xmin: -6.0
ymin: -6.0
xmax: 6.0
ymax: 6.0
delta: 0.05
srr: 0.01
srt: 0.02
str: 0.01
stt: 0.02
