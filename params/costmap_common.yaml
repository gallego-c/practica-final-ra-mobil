# footprint is read directly by Costmap2DROS from the costmap namespace (correct level).
footprint: [[-0.205, -0.155], [-0.205, 0.155], [0.077, 0.155], [0.077, -0.155]]
map_type: costmap

# ── ObstacleLayer ────────────────────────────────────────────────────────────
# IMPORTANT: these must be nested under the plugin name "obstacle_layer".
# Costmap2DROS initialises each layer with name = "<costmap_ns>/<plugin_name>",
# so ObstacleLayer::onInitialize() creates NodeHandle("~/<costmap_ns>/obstacle_layer")
# and reads ALL its params from there.
# Loading this file with ns="local_costmap" therefore puts them at:
#   move_base/local_costmap/obstacle_layer/<param>  ← correct namespace.
obstacle_layer:
  enabled:         true
  obstacle_range:  2.5
  raytrace_range:  3.5
  max_obstacle_height: 2.0
  min_obstacle_height: 0.0
  observation_sources: scan other_robot
  scan:
    data_type:           LaserScan
    topic:               scan           # overridden per robot in navigation.launch
    sensor_frame:        ""             # use header.frame_id from message
    marking:             true
    clearing:            true
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0
  other_robot:
    data_type:              PointCloud2
    topic:                  other_robot_cloud  # overridden per robot in navigation.launch
    sensor_frame:           map
    marking:                true
    clearing:               false
    min_obstacle_height:    0.0
    max_obstacle_height:    0.5
    observation_persistence: 1.0

# ── InflationLayer ───────────────────────────────────────────────────────────
# Same principle: nested under "inflation_layer" so InflationLayer reads them.
# inflation_radius >= circumscribed radius of footprint (~0.257 m) so that
# corner cells are properly penalised before the robot's corners hit the wall.
# cost_scaling_factor is high so the band is steep and narrow corridors still
# show low-enough cost to be traversable.
inflation_layer:
  inflation_radius:    0.28
  cost_scaling_factor: 12.0
