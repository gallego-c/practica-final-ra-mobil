# Conservative DWA profile for shared-SLAM runs.
max_vel_x: 0.20
min_vel_x: 0.0
max_vel_y: 0.0
min_vel_y: 0.0
max_vel_trans: 0.20
min_vel_trans: 0.02
max_vel_theta: 1.4
min_vel_theta: -1.4
min_rot_vel: 0.20

acc_lim_x: 1.5
acc_lim_y: 0.0
acc_lim_theta: 2.5

xy_goal_tolerance: 0.20
yaw_goal_tolerance: 0.25
latch_xy_goal_tolerance: false

sim_time: 2.0
sim_granularity: 0.025
vx_samples: 12
vy_samples: 0
vtheta_samples: 36

controller_frequency: 10.0

path_distance_bias: 24.0
goal_distance_bias: 16.0
occdist_scale: 0.18

forward_point_distance: 0.20
stop_time_buffer: 0.35
scaling_speed: 0.18
max_scaling_factor: 0.3
oscillation_reset_dist: 0.08
