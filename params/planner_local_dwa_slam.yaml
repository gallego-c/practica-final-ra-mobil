# DWA for SLAM demo (TurtleBot3-style, valid for move_base in namespaced robots).
max_vel_x:      0.22
min_vel_x:     -0.10
max_vel_y:      0.0
min_vel_y:      0.0
max_vel_trans:  0.22
min_vel_trans:  0.05
max_vel_theta:  1.6
min_vel_theta: -1.6
min_rot_vel:    0.25

acc_lim_x:      2.5
acc_lim_y:      0.0
acc_lim_theta:  3.2

xy_goal_tolerance:   0.18
yaw_goal_tolerance:  0.2
latch_xy_goal_tolerance: false

sim_time:        1.7
sim_granularity: 0.025
vx_samples:      18
vy_samples:      0
vtheta_samples:  36

path_distance_bias:  34.0
goal_distance_bias:  18.0
occdist_scale:        0.04

forward_point_distance: 0.16
stop_time_buffer:       0.25
scaling_speed:          0.22
max_scaling_factor:     0.2
oscillation_reset_dist: 0.08
