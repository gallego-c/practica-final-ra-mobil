# DWA Local Planner params tuned for TurtleBot3 Waffle Pi in multi-robot SLAM
# Kinematic limits (smooth and conservative speeds to reduce wheel slip and improve SLAM matching)
max_vel_x:      0.26
min_vel_x:     -0.15
max_vel_y:      0.0
min_vel_y:      0.0
max_vel_trans:  0.26
min_vel_trans:  0.02
max_vel_theta:  1.82
min_vel_theta: -1.82
min_rot_vel:    0.15

acc_lim_x:      2.0
acc_lim_y:      0.0
acc_lim_theta:  2.0

# Goal tolerances
xy_goal_tolerance:   0.25
yaw_goal_tolerance:  0.30
latch_xy_goal_tolerance: false

# Trajectory simulation
sim_time:        1.5
sim_granularity: 0.025
vx_samples:      20
vy_samples:      0
vtheta_samples:  40

controller_frequency: 8.0

# Scoring weights.
# - occdist_scale is set to 0.1 (stronger obstacle avoidance).
# - path_distance_bias is set to 24.0 (allow deviating to avoid clipping).
path_distance_bias:  24.0
goal_distance_bias:  20.0
occdist_scale:        0.22

forward_point_distance: 0.18
stop_time_buffer:       0.2
scaling_speed:          0.22
max_scaling_factor:     0.2
oscillation_reset_dist: 0.12
