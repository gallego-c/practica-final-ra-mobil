# DWA Local Planner params tuned for TurtleBot3 Waffle Pi in multi-robot SLAM
max_vel_x:      0.24
min_vel_x:     -0.12
max_vel_y:      0.0
min_vel_y:      0.0
max_vel_trans:  0.24
min_vel_trans:  0.04
max_vel_theta:  2.0
min_vel_theta: -2.0

acc_lim_x:      2.5
acc_lim_y:      0.0
acc_lim_theta:  3.0

xy_goal_tolerance:   0.22
yaw_goal_tolerance:  0.35
latch_xy_goal_tolerance: true

sim_time:        2.0
sim_granularity: 0.025
vx_samples:      24
vy_samples:      0
vtheta_samples:  48

path_distance_bias:  32.0
goal_distance_bias:  20.0
occdist_scale:        0.12

forward_point_distance: 0.08
stop_time_buffer:       0.15
scaling_speed:          0.24
max_scaling_factor:     0.25
oscillation_reset_dist: 0.08
